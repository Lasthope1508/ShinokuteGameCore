<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>$GODOT_PROJECT_NAME</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress, #start-overlay {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash, #start-overlay {
	top: 0;
	bottom: 0;
}

#status, #start-overlay {
	background-color: #020307;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
}

#status {
	visibility: hidden;
}

#start-overlay {
	z-index: 2;
	gap: 18px;
	font-family: Arial, sans-serif;
}

#start-title {
	color: #52ff4f;
	font-size: 28px;
	font-weight: 800;
	letter-spacing: 0;
	text-shadow: 0 0 14px rgba(82, 255, 79, 0.65);
}

#start-button {
	min-width: 220px;
	min-height: 58px;
	border: 2px solid #52ff4f;
	background: rgba(3, 12, 8, 0.95);
	color: #52ff4f;
	font-size: 20px;
	font-weight: 800;
	cursor: pointer;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 3;
}
		</style>
		$GODOT_HEAD_INCLUDE
	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="start-overlay">
			<div id="start-title">GLYPHFLOW ARRAYS</div>
			<button id="start-button" type="button">TAP TO START</button>
		</div>

		<div id="status">
			<img id="status-splash" src="$GODOT_SPLASH" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="$GODOT_URL"></script>
		<script>
const GODOT_CONFIG = $GODOT_CONFIG;
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const startOverlay = document.getElementById('start-overlay');
	const startButton = document.getElementById('start-button');
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let started = false;
	let statusMode = '';

	function unlockAudio() {
		if (window.__glyphflowAudioUnlockState && window.__glyphflowAudioUnlockState.unlock) {
			window.__glyphflowAudioUnlockState.unlock();
		}
	}

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occured');
		}
		setStatusMode('notice');
		initializing = false;
	}

	function isAudioRunning() {
		const states = document.documentElement.dataset.glyphflowAudioContextStates || '';
		return states.split(',').indexOf('running') >= 0;
	}

	function startGameFromGesture() {
		if (started) {
			return;
		}
		started = true;
		unlockAudio();
		startButton.textContent = 'STARTING...';
		window.setTimeout(function () {
			unlockAudio();
			startOverlay.remove();
			startGodot();
		}, 180);
	}

	function startGodot() {
		const missing = Engine.getMissingFeatures({
			threads: GODOT_THREADS_ENABLED,
		});

		if (missing.length !== 0) {
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
			return;
		}

		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			unlockAudio();
			setStatusMode('hidden');
		}, displayFailureNotice);
	}

	startButton.addEventListener('click', startGameFromGesture);
	startOverlay.addEventListener('pointerdown', unlockAudio, { capture: true, passive: true });
	startOverlay.addEventListener('touchstart', unlockAudio, { capture: true, passive: true });
}());
		</script>
	</body>
</html>
